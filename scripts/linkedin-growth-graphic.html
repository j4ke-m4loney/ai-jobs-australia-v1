<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Jobs Australia — Growth</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .card {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(155deg, #0a1628 0%, #0f2040 50%, #162d54 100%);
    padding: 64px 72px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -120px;
    right: -120px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(56, 120, 230, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  .brand {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .date-badge {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.35);
    background: rgba(255, 255, 255, 0.06);
    padding: 8px 18px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .title {
    font-size: 38px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.15;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .title span {
    background: linear-gradient(135deg, #5a9cf5, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 17px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.4);
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  .chart-container {
    flex: 1;
    position: relative;
    z-index: 1;
    margin-bottom: 28px;
  }

  .stats-row {
    display: flex;
    gap: 24px;
    position: relative;
    z-index: 1;
    margin-bottom: 24px;
  }

  .stat-box {
    flex: 1;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 14px;
    padding: 20px 24px;
    text-align: center;
  }

  .stat-number {
    font-size: 32px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .stat-number.blue {
    background: linear-gradient(135deg, #60a5fa, #93c5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-number.purple {
    background: linear-gradient(135deg, #8b5cf6, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-number.green {
    background: linear-gradient(135deg, #34d399, #6ee7b7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    position: relative;
    z-index: 1;
  }

  .footer-text {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.25);
  }

  .footer-url {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.4);
  }

  .legend {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .legend-dot.clicks { background: #60a5fa; }
  .legend-dot.impressions { background: #8b5cf6; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="brand">AI Jobs Australia</div>
    <div class="date-badge">Google Search Console</div>
  </div>

  <div class="title">5 months. Zero ads. <span>Pure organic growth.</span></div>
  <div class="subtitle">Oct 2025 — Feb 2026</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot clicks"></div> Clicks</div>
    <div class="legend-item"><div class="legend-dot impressions"></div> Impressions</div>
  </div>

  <div class="chart-container">
    <canvas id="growthChart"></canvas>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-number blue">101</div>
      <div class="stat-label">Peak daily clicks</div>
    </div>
    <div class="stat-box">
      <div class="stat-number purple">11.3K</div>
      <div class="stat-label">Peak daily impressions</div>
    </div>
    <div class="stat-box">
      <div class="stat-number green">+125%</div>
      <div class="stat-label">Apply clicks MoM</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">Organic search only — no paid ads or sponsored placements</div>
    <div class="footer-url">aijobsaustralia.com.au</div>
  </div>
</div>

    ["2025-11-25",11,462],["2025-11-26",18,414],["2025-11-27",10,351],["2025-11-28",18,249],
    ["2025-11-29",7,331],["2025-11-30",17,395],

  ];

  const labels = rawData.map(d => {
    const date = new Date(d[0] + 'T00:00:00');
    const month = date.toLocaleString('en-AU', { month: 'short' });
    const day = date.getDate();
    return (day === 1 || day === 15) ? `${day} ${month}` : '';
  });

  const clicksData = rawData.map(d => d[1]);
  const impressionsData = rawData.map(d => d[2]);

  const ctx = document.getElementById('growthChart').getContext('2d');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Clicks',
          data: clicksData,
          borderColor: '#60a5fa',
          backgroundColor: 'rgba(96, 165, 250, 0.08)',
          fill: true,
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.3,
          yAxisID: 'y',
        },

          label: 'Impressions',
          data: impressionsData,
          borderColor: '#8b5cf6',

      ]

    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false,
      },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false }
      },
      scales: {
        x: {
          grid: {

          },

        },
        y: {
          position: 'left',
          grid: {
            color: 'rgba(255, 255, 255, 0.04)',
            drawBorder: false,
          },
          ticks: {
            color: 'rgba(96, 165, 250, 0.5)',
            font: { family: 'Inter', size: 12, weight: '600' },
          },
          border: { display: false },
          title: {
            display: true,
            text: 'Clicks',
            color: 'rgba(96, 165, 250, 0.5)',
            font: { family: 'Inter', size: 12, weight: '600' },
          },
          min: 0,
          max: 120,
        },
        y1: {
          position: 'right',
          grid: { drawOnChartArea: false },
          ticks: {
            color: 'rgba(139, 92, 246, 0.5)',
            font: { family: 'Inter', size: 12, weight: '600' },
            callback: function(value) {
              if (value >= 1000) return (value / 1000).toFixed(0) + 'K';
              return value;
            },
          },
          border: { display: false },
          title: {
            display: true,
            text: 'Impressions',
            color: 'rgba(139, 92, 246, 0.5)',
            font: { family: 'Inter', size: 12, weight: '600' },
          },
          min: 0,
          max: 12000,
        },
      },
    },
  });
</script>

</body>
</html>
